<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestión de Alquileres</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#f9fafb;min-height:100vh}
.header{background:#16a34a;color:white;padding:16px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:bold}
.header p{font-size:12px;color:#bbf7d0}
.back{background:none;border:none;color:white;font-size:22px;cursor:pointer;margin-right:4px}
.container{max-width:520px;margin:0 auto;padding:16px}
.card{background:white;border-radius:12px;border:1px solid #f0f0f0;box-shadow:0 1px 4px rgba(0,0,0,0.07);padding:16px;margin-bottom:12px}
.inq-nombre{font-weight:bold;color:#1f2937;font-size:15px}
.inq-prop{font-size:12px;color:#6b7280;margin-top:2px}
.inq-tel{font-size:12px;color:#16a34a;margin-top:2px}
.row-top{display:flex;justify-content:space-between;align-items:flex-start}
.acciones{display:flex;gap:8px;margin-top:4px}
.btn-edit{font-size:12px;color:#3b82f6;background:none;border:none;cursor:pointer}
.btn-del{font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer}
.btn-liq{width:100%;margin-top:12px;background:#f0fdf4;color:#16a34a;font-weight:600;border:none;padding:10px;border-radius:8px;cursor:pointer;font-size:14px}
.btn-liq:hover{background:#dcfce7}
.btn-green{width:100%;background:#16a34a;color:white;font-weight:700;border:none;padding:14px;border-radius:12px;cursor:pointer;font-size:14px;margin-bottom:8px}
.btn-green:hover{background:#15803d}
.btn-wsp{width:100%;background:#25D366;color:white;font-weight:700;border:none;padding:14px;border-radius:12px;cursor:pointer;font-size:14px;margin-bottom:8px}
.btn-wsp:hover{background:#1ebe5d}
.btn-gray{width:100%;background:#f3f4f6;color:#374151;font-weight:600;border:none;padding:12px;border-radius:10px;cursor:pointer;font-size:14px;margin-bottom:8px}
.btn-gray:hover{background:#e5e7eb}
.btn-blue{width:100%;background:#2563eb;color:white;font-weight:700;border:none;padding:14px;border-radius:12px;cursor:pointer;font-size:14px;margin-bottom:8px}
.btn-blue:hover{background:#1d4ed8}
.input{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;margin-bottom:2px}
.input:focus{border-color:#16a34a;box-shadow:0 0 0 2px #bbf7d0}
.label{font-size:12px;color:#6b7280;display:block;margin-bottom:4px;margin-top:10px}
.select{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;background:white}
.total-box{background:#f0fdf4;border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin:12px 0}
.total-lbl{font-weight:bold;color:#374151}
.total-val{font-weight:bold;color:#16a34a;font-size:18px}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1}
.btn-nuevo{background:#16a34a;color:white;font-weight:600;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;white-space:nowrap}
.msg-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px;font-size:13px;white-space:pre-line;line-height:1.6;color:#1f2937;margin-bottom:12px}
.sep{display:flex;align-items:center;gap:8px;margin:8px 0}
.sep-line{flex:1;border-top:1px solid #e5e7eb}
.sep-txt{font-size:11px;color:#9ca3af;white-space:nowrap}
.highlight{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px 16px;margin-bottom:12px}
.highlight .inq-nombre{color:#166534}
.pesos{position:relative}
.pesos span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:14px}
.pesos input{padding-left:28px}
.two-col{display:flex;gap:12px}
.two-col>div{flex:1}
h2{font-weight:bold;color:#374151;margin-bottom:12px;font-size:16px}
h3{font-weight:bold;color:#374151;margin-bottom:12px;font-size:15px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row button{flex:1}
.hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <button class="back hidden" id="btnBack" onclick="goBack()">←</button>
  <div>
    <h1>🏠 Gestión de Alquileres</h1>
    <p id="headerSub"></p>
  </div>
</div>

<div class="container">
  <div id="vistaLista"></div>
  <div id="vistaNuevo" class="hidden"></div>
  <div id="vistaEditar" class="hidden"></div>
  <div id="vistaForm" class="hidden"></div>
  <div id="vistaMsg" class="hidden"></div>
</div>

<script>
const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const mesActual = meses[new Date().getMonth()];
const anio = new Date().getFullYear();
const fechaHoy = () => { const d=new Date(); return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`; };
const fmtPesos = v => { const n=parseFloat((v||"0").toString().replace(/\./g,"").replace(",",".")); return isNaN(n)?"0":n.toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:2}); };
const parsePesos = v => parseFloat((v||"0").toString().replace(/\./g,"").replace(",",".")) || 0;

let inquilinos = [
  {id:4, nombre:"ALTURRIA WALTER", telefono:"5493585432862", propiedad:"SAN LORENZO 596 D", formaPago:"Otro"},
  {id:15,nombre:"BISOTTO JOHANA", telefono:"5493585415744", propiedad:"PUERREYDON 262 LOCAL", formaPago:"Otro"},
  {id:16,nombre:"CERVELLA MARIELA", telefono:"5493585408466", propiedad:"DR EUGENIO FODOR 296", formaPago:"Otro"},
  {id:17,nombre:"CERVELLA SILVINA", telefono:"5493585408466", propiedad:"DR EUGENIO FODOR 296", formaPago:"Otro"},
  {id:6, nombre:"CORIA MIGUEL", telefono:"5493584244153", propiedad:"SAN LORENZO 596 F", formaPago:"Otro"},
  {id:12,nombre:"DIAZ ELIZABETH", telefono:"5493585590194", propiedad:"PUERREYDON 262 A", formaPago:"Otro"},
  {id:2, nombre:"GABELLE MARTIN", telefono:"5493585433415", propiedad:"GOB SABATTINI B", formaPago:"Otro"},
  {id:9, nombre:"GONZALES ALEXANDRA", telefono:"5493585413107", propiedad:"PUERREYDON 262 D", formaPago:"Otro"},
  {id:7, nombre:"IMENZON M.EUGENIA", telefono:"5493585431197", propiedad:"SAN LORENZO 596 G", formaPago:"Otro"},
  {id:8, nombre:"MAGALLANES HECTOR", telefono:"5493584238399", propiedad:"SAN LORENZO 596 H", formaPago:"Otro"},
  {id:1, nombre:"OVIEDO LUCIA", telefono:"5493585646588", propiedad:"GOB SABATTINI A", formaPago:"Transferencia"},
  {id:14,nombre:"RIVAS CLAUDIA", telefono:"5493585404455", propiedad:"SAN JUAN BOSCO 356", formaPago:"Otro"},
  {id:5, nombre:"SANNI HUGO", telefono:"5493585646244", propiedad:"SAN LORENZO 596 E", formaPago:"Otro"},
  {id:3, nombre:"TONELLO DANIEL", telefono:"5493585412406", propiedad:"SAN LORENZO 596 C", formaPago:"Otro"},
  {id:10,nombre:"TOULET CAMILA", telefono:"5493585409125", propiedad:"PUERREYDON 262 C", formaPago:"Otro"},
  {id:11,nombre:"TULIAN SOLEDAD", telefono:"5493585408727", propiedad:"PUERREYDON 262 B", formaPago:"Otro"},
  {id:13,nombre:"WAYMAN AGUSTINA", telefono:"5493585434385", propiedad:"CURA BROCHERO Y BELGRANO", formaPago:"Otro"},
];

let selInq = null;
let expensas = {alquiler:"",agua:"",gas:"",cloaca:"",luz:""};
let formaPago = "Otro";
let vencimiento = "10";
let nroRecibo = 1;
let editInq = null;
let vistaActual = "lista";

function updateHeader() {
  document.getElementById("headerSub").textContent = `${mesActual} ${anio} · ${inquilinos.length} inquilinos`;
  document.getElementById("btnBack").classList.toggle("hidden", vistaActual === "lista");
}

function showVista(v) {
  vistaActual = v;
  ["lista","nuevo","editar","form","msg"].forEach(x => {
    document.getElementById("vista"+x.charAt(0).toUpperCase()+x.slice(1)).classList.add("hidden");
  });
  document.getElementById("vista"+v.charAt(0).toUpperCase()+v.slice(1)).classList.remove("hidden");
  updateHeader();
}

function goBack() { showVista("lista"); renderLista(); }

function getTotal() {
  return Object.values(expensas).reduce((a,v) => a+parsePesos(v), 0);
}

function getMsgLiq() {
  const fmt = v => { const n=parsePesos(v); return n?`$${fmtPesos(n)}`:null; };
  const l = [`*Liquidación ${mesActual} ${anio}*`, `Hola ${selInq.nombre}!`, `Propiedad: ${selInq.propiedad}`];
  if(fmt(expensas.alquiler)) l.push(`• Alquiler: ${fmt(expensas.alquiler)}`);
  if(fmt(expensas.agua)) l.push(`• Agua: ${fmt(expensas.agua)}`);
  if(fmt(expensas.gas)) l.push(`• Gas: ${fmt(expensas.gas)}`);
  if(fmt(expensas.cloaca)) l.push(`• Cloaca: ${fmt(expensas.cloaca)}`);
  if(fmt(expensas.luz)) l.push(`• Luz: ${fmt(expensas.luz)}`);
  l.push(`*TOTAL: $${fmtPesos(getTotal())}*`, `Forma de pago: ${formaPago}`, `Vencimiento: día ${vencimiento}`);
  return l.join("\n");
}

function getMsgRec() {
  const nro = String(nroRecibo).padStart(4,"0");
  return [`🧾 *RECIBO DE PAGO N° ${nro}*`,`*${mesActual} ${anio}*`,``,
    `Inquilino: ${selInq.nombre}`,`Propiedad: ${selInq.propiedad}`,
    `Fecha de pago: ${fechaHoy()}`,`Forma de pago: ${formaPago}`,``,
    `*TOTAL RECIBIDO: $${fmtPesos(getTotal())}*`,``,`✅ Pago registrado. ¡Gracias!`].join("\n");
}

function abrirWsp(txt) {
  const tel = selInq.telefono.replace(/\D/g,"");
  window.open(`https://wa.me/${tel}?text=${encodeURIComponent(txt)}`,"_blank");
}

// LISTA
function renderLista(busq="") {
  const filtrados = inquilinos.filter(i => i.nombre.includes(busq.toUpperCase()) || i.propiedad.includes(busq.toUpperCase()));
  document.getElementById("vistaLista").innerHTML = `
    <div class="search-row">
      <input class="input" id="busqInput" placeholder="🔍 Buscar..." value="${busq}" oninput="renderLista(this.value)"/>
      <button class="btn-nuevo" onclick="renderNuevo()">+ Nuevo</button>
    </div>
    ${filtrados.map(inq => `
      <div class="card">
        <div class="row-top">
          <div>
            <div class="inq-nombre">${inq.nombre}</div>
            <div class="inq-prop">📍 ${inq.propiedad}</div>
            <div class="inq-tel">📱 ${inq.telefono}</div>
          </div>
          <div class="acciones">
            <button class="btn-edit" onclick="renderEditar(${inq.id})">Editar</button>
            <button class="btn-del" onclick="borrarInq(${inq.id})">Borrar</button>
          </div>
        </div>
        <button class="btn-liq" onclick="seleccionar(${inq.id})">📋 Generar liquidación</button>
      </div>
    `).join("")}
  `;
  showVista("lista");
}

function borrarInq(id) {
  if(!confirm("¿Borrar este inquilino?")) return;
  inquilinos = inquilinos.filter(i => i.id !== id);
  renderLista();
}

// NUEVO
function renderNuevo() {
  document.getElementById("vistaNuevo").innerHTML = `
    <div class="card">
      <h2>Nuevo Inquilino</h2>
      <label class="label">Nombre y apellido *</label>
      <input class="input" id="nNombre" placeholder="Ej: GARCIA JUAN" oninput="this.value=this.value.toUpperCase()"/>
      <label class="label">Propiedad *</label>
      <input class="input" id="nPropiedad" placeholder="Ej: SAN LORENZO 596 A" oninput="this.value=this.value.toUpperCase()"/>
      <label class="label">Teléfono</label>
      <input class="input" id="nTelefono" placeholder="Ej: 5493585123456"/>
      <label class="label">Forma de pago</label>
      <select class="select" id="nPago"><option>Transferencia</option><option selected>Otro</option><option>Efectivo</option></select>
      <div class="btn-row">
        <button class="btn-green" onclick="guardarNuevo()">Guardar</button>
        <button class="btn-gray" onclick="renderLista()">Cancelar</button>
      </div>
    </div>
  `;
  showVista("nuevo");
}

function guardarNuevo() {
  const n = document.getElementById("nNombre").value.trim();
  const p = document.getElementById("nPropiedad").value.trim();
  if(!n||!p) return alert("Nombre y propiedad son obligatorios");
  inquilinos.push({id:Date.now(), nombre:n, propiedad:p, telefono:document.getElementById("nTelefono").value, formaPago:document.getElementById("nPago").value});
  inquilinos.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  renderLista();
}

// EDITAR
function renderEditar(id) {
  editInq = inquilinos.find(i=>i.id===id);
  document.getElementById("vistaEditar").innerHTML = `
    <div class="card">
      <h2>Editar Inquilino</h2>
      <label class="label">Nombre y apellido</label>
      <input class="input" id="eNombre" value="${editInq.nombre}" oninput="this.value=this.value.toUpperCase()"/>
      <label class="label">Propiedad</label>
      <input class="input" id="ePropiedad" value="${editInq.propiedad}" oninput="this.value=this.value.toUpperCase()"/>
      <label class="label">Teléfono</label>
      <input class="input" id="eTelefono" value="${editInq.telefono}"/>
      <label class="label">Forma de pago</label>
      <select class="select" id="ePago">
        <option ${editInq.formaPago==="Transferencia"?"selected":""}>Transferencia</option>
        <option ${editInq.formaPago==="Otro"?"selected":""}>Otro</option>
        <option ${editInq.formaPago==="Efectivo"?"selected":""}>Efectivo</option>
      </select>
      <div class="btn-row">
        <button class="btn-green" onclick="guardarEditar()">Guardar</button>
        <button class="btn-gray" onclick="renderLista()">Cancelar</button>
      </div>
    </div>
  `;
  showVista("editar");
}

function guardarEditar() {
  inquilinos = inquilinos.map(i => i.id===editInq.id ? {...i,
    nombre:document.getElementById("eNombre").value,
    propiedad:document.getElementById("ePropiedad").value,
    telefono:document.getElementById("eTelefono").value,
    formaPago:document.getElementById("ePago").value
  } : i);
  renderLista();
}

// FORM
function seleccionar(id) {
  selInq = inquilinos.find(i=>i.id===id);
  expensas = {alquiler:"",agua:"",gas:"",cloaca:"",luz:""};
  formaPago = selInq.formaPago||"Otro";
  vencimiento = "10";
  renderForm();
}

function renderForm() {
  document.getElementById("vistaForm").innerHTML = `
    <div class="highlight">
      <div class="inq-nombre">${selInq.nombre}</div>
      <div class="inq-prop">📍 ${selInq.propiedad}</div>
    </div>
    <div class="card">
      <h3>Liquidación ${mesActual} ${anio}</h3>
      ${[["alquiler","🏠 Alquiler",true],["agua","💧 Agua",false],["gas","🔥 Gas",false],["cloaca","🚿 Cloaca",false],["luz","💡 Luz",false]].map(([k,l,r])=>`
        <label class="label">${l}${r?" *":""}</label>
        <div class="pesos"><span>$</span><input class="input" id="exp_${k}" placeholder="0" value="${expensas[k]}" oninput="expensas['${k}']=this.value;actualizarTotal()"/></div>
      `).join("")}
      <label class="label">Forma de pago</label>
      <select class="select" id="formaPagoSel" onchange="formaPago=this.value">
        <option ${formaPago==="Transferencia"?"selected":""}>Transferencia</option>
        <option ${formaPago==="Otro"?"selected":""}>Otro</option>
        <option ${formaPago==="Efectivo"?"selected":""}>Efectivo</option>
      </select>
      <label class="label">Vencimiento día</label>
      <input class="input" id="vencInput" value="${vencimiento}" oninput="vencimiento=this.value"/>
      <div class="total-box">
        <span class="total-lbl">TOTAL</span>
        <span class="total-val" id="totalDisplay">$0</span>
      </div>
      <button class="btn-green" id="btnVerMsg" onclick="renderMsg()" style="opacity:0.5;cursor:not-allowed" disabled>Ver mensaje →</button>
    </div>
  `;
  showVista("form");
  actualizarTotal();
}

function actualizarTotal() {
  const t = getTotal();
  const el = document.getElementById("totalDisplay");
  if(el) el.textContent = `$${fmtPesos(t)}`;
  const btn = document.getElementById("btnVerMsg");
  const tieneAlq = parsePesos(expensas.alquiler) > 0;
  if(btn){ btn.disabled=!tieneAlq; btn.style.opacity=tieneAlq?"1":"0.5"; btn.style.cursor=tieneAlq?"pointer":"not-allowed"; }
}

// MENSAJE
function renderMsg() {
  document.getElementById("vistaMsg").innerHTML = `
    <div class="card">
      <h3>📋 Liquidación generada</h3>
      <div class="msg-box">${getMsgLiq()}</div>
    </div>
    <button class="btn-wsp" onclick="abrirWsp(getMsgLiq())">💬 Enviar Liquidación por WhatsApp</button>
    <button class="btn-gray" id="btnCopiar" onclick="copiarMsg()">📋 Copiar mensaje</button>
    <div class="sep"><div class="sep-line"></div><span class="sep-txt">Una vez que el inquilino pague</span><div class="sep-line"></div></div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:20px">🧾</span><strong>Recibo de Pago</strong></div>
      <div class="msg-box">${getMsgRec()}</div>
      <div class="two-col">
        <div>
          <label class="label">N° de recibo</label>
          <input class="input" type="number" id="nroRecInput" value="${nroRecibo}" min="1" oninput="nroRecibo=Number(this.value);actualizarRecibo()"/>
        </div>
        <div>
          <label class="label">Fecha de pago</label>
          <input class="input" value="${fechaHoy()}" readonly style="background:#f9fafb"/>
        </div>
      </div>
      <button class="btn-wsp" onclick="abrirWsp(getMsgRec())">💬 Enviar Recibo por WhatsApp</button>
      <button class="btn-blue" onclick="generarPDF()">📄 Descargar Recibo PDF</button>
    </div>
    <button class="btn-gray" onclick="renderForm()">← Editar montos</button>
  `;
  showVista("msg");
}

function actualizarRecibo() {
  const el = document.querySelector("#vistaMsg .msg-box:last-of-type");
  if(el) el.textContent = getMsgRec();
}

function copiarMsg() {
  navigator.clipboard.writeText(getMsgLiq());
  const btn = document.getElementById("btnCopiar");
  if(btn){ btn.textContent="✅ ¡Copiado!"; setTimeout(()=>btn.textContent="📋 Copiar mensaje",2000); }
}

function generarPDF() {
  const nro = String(nroRecibo).padStart(4,"0");
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    body{font-family:Arial,sans-serif;margin:0;padding:40px;color:#222}
    .box{max-width:600px;margin:auto;border:2px solid #16a34a;border-radius:12px;overflow:hidden}
    .hdr{background:#16a34a;color:#fff;padding:24px 32px}
    .hdr h1{margin:0;font-size:22px}.hdr p{margin:4px 0 0;font-size:13px;opacity:.85}
    .nro{float:right;font-size:13px;opacity:.9;margin-top:4px}
    .body{padding:28px 32px}
    .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e5e7eb;font-size:15px}
    .lbl{color:#555}.val{font-weight:600}
    .tot{display:flex;justify-content:space-between;padding:14px 20px;background:#f0fdf4;border-radius:8px;margin-top:16px}
    .tot span{font-size:17px;font-weight:700;color:#15803d}
    .firma{margin-top:40px;display:flex;justify-content:space-between;font-size:13px;color:#555}
    .fl{border-top:1px solid #999;padding-top:6px;width:180px;text-align:center}
    .ftr{text-align:center;padding:16px;font-size:12px;color:#aaa;border-top:1px solid #e5e7eb}
  </style></head><body><div class="box">
    <div class="hdr"><span class="nro">Recibo N° ${nro}</span><h1>🏠 RECIBO DE ALQUILER</h1><p>${mesActual} ${anio}</p></div>
    <div class="body">
      <div class="row"><span class="lbl">Inquilino</span><span class="val">${selInq.nombre}</span></div>
      <div class="row"><span class="lbl">Propiedad</span><span class="val">${selInq.propiedad}</span></div>
      <div class="row"><span class="lbl">Fecha de pago</span><span class="val">${fechaHoy()}</span></div>
      <div class="row"><span class="lbl">Forma de pago</span><span class="val">${formaPago}</span></div>
      <div class="tot"><span>TOTAL RECIBIDO</span><span>$${fmtPesos(getTotal())}</span></div>
      <div class="firma"><div class="fl">Firma del locador</div><div class="fl">Firma del inquilino</div></div>
    </div>
    <div class="ftr">Recibo generado el ${fechaHoy()} · ${mesActual} ${anio}</div>
  </div></body></html>`;
  const win = window.open("","_blank");
  win.document.write(html); win.document.close();
  setTimeout(()=>win.print(),500);
  nroRecibo++;
}

// INIT
renderLista();
</script>
</body>
</html>
